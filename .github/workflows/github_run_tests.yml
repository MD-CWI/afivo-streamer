name: 'afivo-streamer test suite'

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt install gfortran

      - name: Compile
        run: make

      - name: Run tests
        run: ./run_test.sh


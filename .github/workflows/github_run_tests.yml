name: 'afivo-streamer test suite v2'

on:
  workflow_dispatch:
  push:
    branches:
      - main master github-test
  pull_request:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt install gfortran

      - name: Compile
        run: make

      - name: Run tests
        run: ./run_test.sh

